<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · Page Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#ffffff;
  color:#000;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Container */
.container{
  text-align:center;
  max-width:600px;
  padding:20px;
}

/* 404 Text */
.error-code{
  font-size:120px;
  font-weight:800;
  color:#003f61;
  line-height:1;
}

/* Heading */
.title{
  font-size:28px;
  font-weight:700;
  margin:15px 0;
}

/* Description */
.desc{
  font-size:15px;
  color:#333;
  margin-bottom:30px;
}

/* Button */
.btn{
  display:inline-block;
  padding:12px 28px;
  background:#003f61;
  color:#fff;
  text-decoration:none;
  border-radius:30px;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  background:#000;
}

/* Decorative Circle */
.circle{
  position:absolute;
  width:300px;
  height:300px;
  border:2px solid #003f61;
  border-radius:50%;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  opacity:0.1;
}

/* Dark Mode */
body.dark{
  background:#000;
  color:#fff;
}

body.dark .desc{
  color:#ccc;
}

body.dark .btn{
  background:#003f61;
  color:#fff;
}

body.dark .btn:hover{
  background:#fff;
  color:#000;
}

</style>
</head>

<body>

<div class="circle"></div>

<div class="container">
  <div class="error-code">404</div>
  <h1 class="title">Page Not Found</h1>
  <p class="desc">
    The page you're looking for doesn’t exist or has been moved.
    Let’s get you back on track.
  </p>
  <a href="index.html" class="btn">Back to Home</a>
</div>

</body>
</html>
